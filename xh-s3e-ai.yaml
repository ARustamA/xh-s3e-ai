substitutions:
  device_name: xh-s3e-ai
  friendly_name: "XH-S3E AI Voice"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: VERY_VERBOSE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

# ===== I2S (PDM MIC) =====
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO41

# ===== MICROPHONE =====
microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO42
    pdm: true
    adc_type: external
    channel: left

# ===== SPEAKER =====
speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO17
    dac_type: external
    i2s_mode: primary

# ===== MEDIA PLAYER =====
media_player:
  - platform: speaker
    id: mp
    name: "${friendly_name}"
    announcement_pipeline:
      speaker: spk

# ===== WAKE WORD =====
micro_wake_word:
  models:
    - model: okay_nabu

# ===== VOICE ASSISTANT =====
voice_assistant:
  id: va
  microphone: mic
  media_player: mp
  use_wake_word: true

  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0

  on_listening:
    - light.turn_on: led
  on_end:
    - light.turn_off: led

# ===== LED =====
output:
  - platform: gpio
    id: led_out
    pin: GPIO2
    inverted: true

light:
  - platform: binary
    id: led
    name: "${friendly_name} LED"
    output: led_out

# ===== BUTTON =====
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Voice Button"
    on_press:
      - voice_assistant.start
