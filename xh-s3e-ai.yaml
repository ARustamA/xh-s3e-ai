substitutions:
  device_name: xh-s3e-ai
  friendly_name: "XH-S3E AI Voice"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    then:
      - delay: 1s
      - micro_wake_word.start
  on_client_disconnected:
    then:
      - micro_wake_word.stop

ota:
  - platform: esphome

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO4
    i2s_bclk_pin: GPIO5

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO6
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit   # 16 бит для совместимости с INMP441
    channel: left            # INMP441 обычно выводит звук на левый канал

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO7
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono

media_player:
  - platform: speaker
    name: "${friendly_name}"
    id: mp
    announcement_pipeline:
      speaker: spk
    volume_min: 0.05
    volume_max: 0.35

voice_assistant:
  id: va
  microphone: mic
  media_player: mp
  micro_wake_word: mww
  noise_suppression_level: 1
  auto_gain: 15dBFS
  volume_multiplier: 1.0
  on_end:
    - delay: 500ms
    - micro_wake_word.start
  on_error:
    - delay: 500ms
    - micro_wake_word.start
    
micro_wake_word:
  id: mww
  models:
    - model: alexa
      probability_cutoff: 0.65
      sliding_window_size: 5
  on_wake_word_detected:
    - logger.log:
        level: INFO
        format: "Wake word detected"
    - voice_assistant.start:
        wake_word: !lambda 'return wake_word;'
        
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Voice Button"
    on_press:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop
            - micro_wake_word.start
          else:
            - micro_wake_word.stop
            - voice_assistant.start

light:
  - platform: binary
    id: led
    name: "${friendly_name} LED"
    output: led_out

output:
  - platform: gpio
    id: led_out
    pin: GPIO2
    inverted: true
