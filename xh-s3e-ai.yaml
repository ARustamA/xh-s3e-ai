substitutions:
  device_name: xh-s3e-ai
  friendly_name: "XH-S3E AI Voice"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: VERY_VERBOSE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO4
    i2s_bclk_pin: GPIO5

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO6
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit   # 16 бит для совместимости с INMP441
    channel: left            # INMP441 обычно выводит звук на левый канал

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO7
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit

media_player:
  - platform: speaker
    name: "${friendly_name}"
    id: mp
    announcement_pipeline:
      speaker: spk

voice_assistant:
  id: va
  microphone: mic
  media_player: mp
  noise_suppression_level: 1
  auto_gain: 31dBFS
  volume_multiplier: 4.0

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Voice Button"
    on_press:
      - voice_assistant.start

light:
  - platform: binary
    id: led
    name: "${friendly_name} LED"
    output: led_out

output:
  - platform: gpio
    id: led_out
    pin: GPIO2
    inverted: true
