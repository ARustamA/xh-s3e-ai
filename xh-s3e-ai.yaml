substitutions:
  device_name: xh-s3e-ai
  friendly_name: "XH-S3E AI Voice"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  # level: DEBUG
  level: VERY_VERBOSE

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO41
    i2s_bclk_pin: GPIO38

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO42
    adc_type: external
    # pdm: true
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right
    on_data:
      then:
        - lambda: |-
            // Простейший расчёт «громкости» для отладки
            float sum = 0;
            for (int i = 0; i < samples; i++) {
              sum += abs(data[i]);
            }
            float avg = sum / samples;
            ESP_LOGD("mic", "avg amplitude: %f", avg);

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO17
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit

media_player:
  - platform: speaker
    name: "${friendly_name}"
    id: mp
    announcement_pipeline:
      speaker: spk

 id: va
  microphone: mic
  media_player: mp
  noise_suppression_level: 1       # поменьше шумодава
  auto_gain: 40dBFS                # усилить авто‑усиление (можно 40–50)
  volume_multiplier: 4.0
  vad_threshold: 2                 # сделать менее чувствительным/играться 1–3
  vad_sensitivity: 0.6  

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Voice Button"
    on_press:
      - voice_assistant.start

light:
  - platform: binary
    id: led
    name: "${friendly_name} LED"
    output: led_out

output:
  - platform: gpio
    id: led_out
    pin: GPIO2
    inverted: true
