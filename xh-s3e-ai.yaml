substitutions:
  device_name: xh-s3e-ai
  friendly_name: "XH-S3E AI Voice"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  baud_rate: 0

# ===== WIFI =====
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "${friendly_name} Hotspot"
    password: "12345678"

# ===== API =====
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

# ===== I2S (для микрофона) =====
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO41
    i2s_bclk_pin: GPIO38

# ===== МИКРОФОН (PDM) =====
microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO42
    adc_type: external
    pdm: true
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: right

# ===== ДИНАМИК =====
speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO17
    dac_type: external


# ===== MEDIA PLAYER =====
media_player:
  - platform: speaker
    name: "${friendly_name}"
    id: mp
    announcement_pipeline:
      speaker: spk

# ===== WAKE WORD =====
micro_wake_word:
  models:
    - model: okay_nabu
# ===== VOICE ASSISTANT =====
voice_assistant:
  id: va
  microphone: mic
  media_player: mp
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_listening:
    - light.turn_on: led
  on_end:
    - light.turn_off: led

# ===== LED =====
light:
  - platform: binary
    id: led
    name: "${friendly_name} LED"
    output: led_out

output:
  - platform: gpio
    id: led_out
    pin: GPIO2
    inverted: true

# ===== (опционально) кнопка как fallback =====
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Voice Button"
    on_press:
      - voice_assistant.start