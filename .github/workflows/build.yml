name: Build ESPHome
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Build ESPHome
        run: |
          esphome compile xh-s3e-ai.yaml

      - name: List build files
        run: |
          find .esphome -type f -name "*.bin" 2>/dev/null || true

      - name: Upload firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .esphome/
          retention-days: 1