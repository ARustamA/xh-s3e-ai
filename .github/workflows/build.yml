name: Build ESPHome
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESPHome
        run: |
          pip install esphome

      - name: Build ESPHome
        run: |
          esphome compile xh-s3e-ai.yaml

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .esphome/build/xh-s3e-ai/.pioenvs/xh-s3e-ai/firmware.bin
          retention-days: 1